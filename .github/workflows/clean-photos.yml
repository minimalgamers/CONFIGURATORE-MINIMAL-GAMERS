name: 🧹 Clean Photos v3 (Smart)

# Workflow MIGLIORATO con:
# - Ripristino foto originali dal commit pre-cleanup
# - Algoritmo edge-aware: case bianchi NON vengono mangiati
# - Detection foto ambiente più severa (mani, scrivanie, schermo)
# - Detection foto promo (sfondi colorati saturi)
# - Detection video thumbnail YouTube
# - Marcatura prodotti per re-download nel prossimo nightly

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (solo simula, non modifica)'
        required: false
        default: false
        type: boolean
      restore_original_photos:
        description: 'Ripristina foto originali pre-cleanup PRIMA di processare'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  clean-photos-smart:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # serve per accedere ai commit precedenti
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow numpy
      
      - name: 🔙 Restore original photos
        if: ${{ inputs.restore_original_photos == true }}
        run: |
          echo "Ripristino foto al commit pre-cleanup..."
          # Trovo il commit prima del bot auto-clean
          BOT_COMMIT=$(git log --pretty=format:"%H %s" --all | grep "Auto-clean: ripulite foto" | head -1 | awk '{print $1}')
          if [ -z "$BOT_COMMIT" ]; then
            echo "❓ Non trovo commit del bot, salto restore"
          else
            echo "Commit bot: $BOT_COMMIT"
            PARENT=$(git rev-parse "${BOT_COMMIT}^")
            echo "Parent (pre-cleanup): $PARENT"
            # Ripristino solo la cartella foto/ dal parent
            git checkout "$PARENT" -- foto/
            # Ripristino anche prodotti.json se è cambiato
            git checkout "$PARENT" -- prodotti.json
            echo "✓ Foto e prodotti.json ripristinati allo stato pre-cleanup"
          fi
      
      - name: 🧹 Run smart photo cleaner
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          python clean_photos.py
      
      - name: 📊 Show report summary
        if: always()
        run: |
          if [ -f photo_cleanup_report.json ]; then
            echo "=== REPORT SUMMARY ==="
            python -c "
          import json
          with open('photo_cleanup_report.json') as f:
              r = json.load(f)
          print('Stats:')
          for k, v in r['stats'].items():
              if not k.startswith('bad_'):
                  print(f'  {k}: {v}')
          print()
          print(f'Prodotti da rimuovere subito: {len(r[\"mpn_to_remove\"])}')
          print(f'Prodotti per re-download: {len(r[\"mpn_to_redownload\"])}')
          print(f'Tempo: {r[\"elapsed_seconds\"]}s')
          "
          fi
      
      - name: 💾 Commit changes
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage solo le modifiche reali
          git add foto/ prodotti.json photo_cleanup_report.json prodotti_redownload.json 2>/dev/null || true
          
          # Commit solo se ci sono modifiche
          if git diff --cached --quiet; then
            echo "✅ Nessuna modifica da committare"
          else
            git commit -m "🧹 Smart auto-clean v3: edge-aware bg removal + filtro prodotti
          
          Workflow: ${{ github.workflow }}
          Run: ${{ github.run_id }}"
            git push
            echo "✅ Modifiche committate e pushate"
          fi
      
      - name: 📤 Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-cleanup-report-v3
          path: |
            photo_cleanup_report.json
            prodotti_redownload.json
          retention-days: 30
